version: 2

updates:
  # npm dependencies (React, Vite, Tailwind, etc.)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"
      - "npm"

    commit-message:
      prefix: "deps"

    versioning-strategy: increase

    # Ignore major updates to avoid breaking changes
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # GitHub Actions updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"

    open-pull-requests-limit: 3

    labels:
      - "dependencies"
      - "github-actions"

    commit-message:
      prefix: "ci"
